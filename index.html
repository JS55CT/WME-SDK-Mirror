<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WME SDK Documentation Mirror</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .links {
            display: flex;
            gap: 15px;
            flex-direction: column;
        }
        a {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1.05em;
        }
        .btn-github {
            background: #333;
            color: white;
        }
        .btn-github:hover {
            background: #555;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .btn-docs {
            background: #667eea;
            color: white;
        }
        .btn-docs:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ WME SDK Documentation Mirror</h1>
        <p class="subtitle">
            LLM-ready documentation for the Waze Map Editor SDK — automatically kept fresh and optimized for Claude Code
        </p>

        <div class="links">
            <a href="https://github.com/JS55CT/WME-SDK-Mirror" class="btn-github">
                View on GitHub →
            </a>
            <a href="https://js55ct.github.io/WME-SDK-Mirror/production/latest/output/docs/index.md" class="btn-docs">
                View Documentation →
            </a>
        </div>

        <div class="info">
            <p>
                📚 Complete SDK reference | 🚀 Real-world examples | 🔄 Auto-updated | 🤖 AI-optimized
            </p>
        </div>
    </div>
</body>
</html>
